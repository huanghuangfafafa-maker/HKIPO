const TC={listed:'cl',close:'cc',open:'co',hear:'ch',filed:'cf',lapsed:'cx',intent:'ci'};
const TB={listed:'eb-l',close:'eb-c',open:'eb-o',hear:'eb-h',filed:'eb-f',lapsed:'eb-x',intent:'eb-i'};
const TL={listed:'挂牌上市',close:'申购截止',open:'招股开始',hear:'聆讯通过',filed:'递表中',lapsed:'招股书失效',intent:'意向公告'};
const DW=['日','一','二','三','四','五','六'];

function build(){
  const cal=document.getElementById('cal');
  for(let i=0;i<0;i++){const e=document.createElement('div');e.className='day empty';cal.appendChild(e);}
  for(let d=1;d<=31;d++){
    const dow=(d-1)%7;const isWk=dow===0||dow===6;
    const isPast=d<25;const isToday=d===25;
    const evs=E[d]||[];
    const el=document.createElement('div');
    el.className=['day',isWk?'wkend':'',isPast?'past':'',isToday?'today':'',!evs.length?'no-ev':''].filter(Boolean).join(' ');
    const dn=document.createElement('div');dn.className='dn';
    dn.innerHTML=d+(isToday?'<span class="dn-t">今日</span>':'');
    el.appendChild(dn);
    evs.slice(0,3).forEach(ev=>{
      const c=document.createElement('span');c.className='chip '+TC[ev.t];c.textContent=ev.n;el.appendChild(c);
    });
    if(evs.length>3){const m=document.createElement('div');m.className='more';m.textContent=`+${evs.length-3}`;el.appendChild(m);}
    if(evs.length)el.addEventListener('click',()=>open_(d,evs));
    cal.appendChild(el);
  }
  const tot=31,rem=(7-tot%7)%7;
  for(let i=0;i<rem;i++){const e=document.createElement('div');e.className='day empty';cal.appendChild(e);}
}

function open_(d,evs){
  document.getElementById('sd').textContent=`2026年3月${d}日（周${DW[(d-1)%7]}）· ${evs.length}个事件`;
  const b=document.getElementById('sb');b.innerHTML='';
  evs.forEach(ev=>{
    const ec=document.createElement('div');ec.className='ec';
    const kg=ev.k.map(([l,v])=>`<div class="ki"><div class="kl">${l}</div><div class="kv">${v}</div></div>`).join('');
    const tg=ev.tg.map(t=>`<span class="et et-gray">${t}</span>`).join('');
    const cd=ev.c&&ev.c!=='——'?`<span class="et et-b">${ev.c}</span>`:'';
    ec.innerHTML=`<div class="eh"><div><div class="en">${ev.n}</div><div class="et-wrap">${cd}${tg}</div></div><span class="eb ${TB[ev.t]}">${TL[ev.t]}</span></div><div class="kg">${kg}</div>${ev.d?`<div class="ed">${ev.d}</div>`:''}`;
    b.appendChild(ec);
  });
  document.getElementById('modal').classList.remove('hidden');
  document.querySelector('.sheet').scrollTop=0;
}
function cm(){document.getElementById('modal').classList.add('hidden')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')cm()});
build();
</script>
